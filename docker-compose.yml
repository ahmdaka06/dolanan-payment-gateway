services:
  # PostgreSQL
  pgsql:
    image: postgres:17-alpine
    container_name: dolanan-pgsql
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: dolanan-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app_network

  # API (NestJS + Fastify)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: dolanan-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - '3000'
    networks:
      - app_network

  # Web (Next.js - placeholder, akan dibuat nanti)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: dolanan-web
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - '3001'
    networks:
      - app_network
    profiles:
      - full

  # Nginx (Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: dolanan-nginx
    restart: unless-stopped
    ports:
      - '${NGINX_PORT:-8080}:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - app_network

volumes:
  pg_data:
  redis_data:

networks:
  app_network:
    driver: bridge
